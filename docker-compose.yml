services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: novaryn_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./chromadb_data:/app/chromadb_data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: novaryn_frontend
    ports:
      - "5000:5000"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: novaryn_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres@22
      POSTGRES_DB: novaryn_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: