version: "3.9"

services:

  backend:
    build:
      context: ./backend
    container_name: novaryn_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./chromadb:/app/chromadb

  frontend:
    build:
      context: ./frontend
    container_name: novaryn_frontend
    ports:
      - "5000:5000"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: novaryn_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: novaryn_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: