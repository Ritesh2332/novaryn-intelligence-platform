# Render Blueprint for Novaryn AI Platform
# Deploy to Render: https://dashboard.render.com/blueprint

services:
  - type: web
    name: novaryn-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    plan: standard
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: novaryn-db
          property: connectionString
      - key: NEWS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: PYTHONPATH
        value: /app
    disk:
      name: chromadb-data
      mountPath: /app/chromadb_data
      sizeGB: 1

  - type: web
    name: novaryn-frontend
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    plan: free
    envVars:
      - key: BACKEND_URL
        fromService:
          name: novaryn-backend
          type: web
          property: url

databases:
  - name: novaryn-db
    databaseName: novaryn_db
    user: postgres
    plan: free
